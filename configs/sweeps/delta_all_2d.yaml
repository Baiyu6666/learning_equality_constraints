project: equality_manifold_unified
entity: pby
program: runners/run_sweep.py
method: grid
metric:
  name: sweep/avg/proj_manifold_dist
  goal: minimize
parameters:
  seed:
    values: [173]

command:
  - ${env}
  - python
  - -m
  - runners.run_sweep
  - --method
  - delta
  - --datasets
  - 2d_ellipse,2d_looped_spiro,2d_planar_arm_line_n2, 2d_sparse_sine
  - --config-root
  - configs
  - --outdir
  - outputs_unified/sweeps/delta_all_2d
  - --method-tag-prefix
  - method
